name: Refresh GMI Risk Monitor (GMI edition)

# Builds dashboard-risk-monitor/gmi.html — the GMI-branded Risk Monitor whose
# "GMI Positions" tab auto-syncs from the repo-canonical GMI Positions book
# (gmi-positions-source.json, committed by Cowork). Triggers:
#   - push to the positions book → rebuild within minutes of an open/close
#   - daily cron → fresh prices/vol (the weekly trend signal itself only
#     moves on weekly bars)
#   - manual dispatch
# Fail-loud contract as risk-monitor.yml: a bad feed, an unmapped ticker, or
# a missing/malformed positions book turns the job RED, but what resolved is
# still committed so the gap is visible.
on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * *'   # daily 07:30 UTC (after US close, before EU open)
  push:
    branches: [main]
    paths:
      - 'dashboard-risk-monitor/gmi-positions-source.json'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build GMI Risk Monitor (fail-loud on bad feeds / unsynced positions)
        run: python build_gmi_risk_monitor.py

      - name: Commit refreshed dashboard
        if: always()   # commit what resolved even if the gate failed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard-risk-monitor/gmi.html dashboard-risk-monitor/gmi-positions.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "gmi risk monitor: refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main   # in case main moved during the run
            git push
          fi
