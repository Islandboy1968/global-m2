name: Update Global M2 data

on:
  schedule:
    - cron: '30 6 * * *'   # 06:30 UTC daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Persist the TradingView pull caches across runs so each daily refresh
      # only needs to fetch genuinely new bars. Caches are kept out of git on
      # purpose (.gitignore); GitHub Actions cache holds them between runs.
      - name: Restore data caches
        uses: actions/cache@v4
        with:
          path: |
            series_cache.json
            fx_daily_cache.json
          key: tgl-data-caches-${{ github.run_id }}
          restore-keys: |
            tgl-data-caches-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python update_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/data.js
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
