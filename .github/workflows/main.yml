name: Update Global M2 data

on:
  schedule:
    - cron: '30 6 * * *'   # 06:30 UTC daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python update_data.py

      - name: Verify against source & stamp freshness
        # Goes to each series' source, compares to what we built, stamps per-series
        # freshness into data/* for the dashboard badge, and FAILS the job if any
        # series is missing or genuinely behind its source. Runs before commit so
        # the source-verified freshness is what gets published.
        run: python verify_data.py --gate

      - name: Commit refreshed data
        # if: always() so the honest (source-verified) freshness is committed even
        # when the gate flags a stale series — the dashboard must always tell the
        # truth, and the failed gate still turns the run red as a loud alert.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/data.js data/summary.json data/index.json data/us_narrow_seed.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
