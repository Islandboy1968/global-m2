<script>
// ===========================================================================
//  COMPUTE MODULE  —  pure, framework-agnostic functions.
//  This is the dashboard's "brain": the frozen log-regression and the
//  buy/sell simulation. It has NO knowledge of React, Recharts, the data
//  source, or the DOM. Give it a price series + parameters, it returns numbers.
//
//  Because it is pure, it ships UNCHANGED from prototype to production. Nobody
//  re-implements the regression in Python and risks getting it subtly wrong —
//  the same tested function runs everywhere. It is also trivially unit-testable
//  (see the check-cases in SPEC_compounding-machine.md §8).
// ===========================================================================
(function (global) {
  "use strict";

  var DAY = 864e5;
  var WEEK = 604800000;

  // Parse a "YYYY-MM-DD" key to a millisecond timestamp (local midnight).
  function ts(d) {
    if (typeof d === "number") return d;
    var p = d.split("-");
    return new Date(+p[0], +p[1] - 1, +p[2]).getTime();
  }

  // Ordinary least squares: returns {a: intercept, b: slope}.
  function linReg(xs, ys) {
    var n = xs.length, sx = 0, sy = 0, sxy = 0, sx2 = 0;
    for (var i = 0; i < n; i++) {
      sx += xs[i]; sy += ys[i]; sxy += xs[i] * ys[i]; sx2 += xs[i] * xs[i];
    }
    var b = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
    return { a: (sy - b * sx) / n, b: b };
  }

  // Fit the FROZEN log-linear trend on closes up to freezeDate.
  // Returns the regression coefficients + headline readouts. Once fit, these
  // numbers never move — that is what "frozen Dec '25" means.
  //   series: [{d, c}]   startDate/freezeDate: "YYYY-MM-DD"
  function fitFrozenRegression(series, opts) {
    var ref = ts(opts.startDate);
    var freeze = ts(opts.freezeDate);
    var fit = series.filter(function (p) { return ts(p.d) <= freeze; });
    if (fit.length < 10) return null;
    var xs = fit.map(function (p) { return (ts(p.d) - ref) / DAY; });
    var ly = fit.map(function (p) { return Math.log(p.c); });
    var r = linReg(xs, ly);
    var res = ly.map(function (l, i) { return l - (r.a + r.b * xs[i]); });
    var sd = Math.sqrt(res.reduce(function (s, e) { return s + e * e; }, 0) / res.length);
    return {
      a: r.a, b: r.b, sd: sd, ref: ref,
      impliedCAGR: Math.round((Math.exp(r.b * 365) - 1) * 100), // %/yr
      sd1pct: Math.round((Math.exp(sd) - 1) * 100)               // 1σ as a %
    };
  }

  // Build the price-vs-trend channel: historical points carry the real price;
  // forward points (to projectToYear) carry trend + bands only (NOT a forecast).
  function buildChannel(series, reg, opts) {
    var buyT = opts.buyThreshold, sellT = opts.sellThreshold;
    function pt(date, price, isProj) {
      var x = (date - reg.ref) / DAY;
      var tv = reg.a + reg.b * x;
      var base = {
        date: date, trend: Math.exp(tv),
        upper1: Math.exp(tv + reg.sd), lower1: Math.exp(tv - reg.sd),
        upper2: Math.exp(tv + 2 * reg.sd), lower2: Math.exp(tv - 2 * reg.sd),
        isProjection: isProj
      };
      if (isProj) {
        base.price = null; base.logDev = null;
        base.isOversold = false; base.isOverbought = false;
        return base;
      }
      base.price = price;
      base.logDev = (Math.log(price) - tv) / reg.sd;
      base.isOversold = price < Math.exp(tv - buyT * reg.sd);
      base.isOverbought = price > Math.exp(tv + sellT * reg.sd);
      return base;
    }
    var hist = series.map(function (p) { return pt(ts(p.d), p.c, false); });
    var lastDate = ts(series[series.length - 1].d);
    var end = new Date(opts.projectToYear, 0, 1).getTime();
    var proj = [];
    for (var t = lastDate + WEEK; t <= end; t += WEEK) proj.push(pt(t, null, true));
    return { hist: hist, proj: proj, all: hist.concat(proj), lastDate: lastDate };
  }

  // Run the strategy across the full history. Mirrors the prototype exactly:
  //  - fixed-dollar add each time price is oversold (with re-arming)
  //  - optional lifestyle-chip sell of sellPct of holdings when overbought
  //  - cash from sells is recycled into the next buys (reduces out-of-pocket)
  // Also runs the "no sells" pure-compounding path and the HODL baseline.
  function simulate(channel, reg, params) {
    var initialStake = params.initialStake,
        buyThreshold = params.buyThreshold,
        buyAmount = params.buyAmount,
        sellThreshold = params.sellThreshold,
        sellPct = params.sellPct;
    var all = channel.all;

    var units = initialStake / all[0].price, hodlUnits = units;
    var cash = 0, totalDeployed = initialStake, outOfPocket = initialStake, totalCashedOut = 0;
    var bArm = true, sArm = true;
    var buys = [], sells = [];

    var sim = all.map(function (d, i) {
      if (d.isProjection) return Object.assign({}, d, { strategy: null, hodl: null });
      if (!bArm && d.logDev > -buyThreshold / 2) bArm = true;
      if (!sArm && d.logDev < sellThreshold / 2) sArm = true;
      if (d.isOversold && bArm && i > 0) {
        var amt = buyAmount;
        totalDeployed += amt;
        if (cash >= amt) cash -= amt; else { outOfPocket += amt - cash; cash = 0; }
        units += amt / d.price; bArm = false;
        buys.push({ date: d.date, price: d.price, amount: amt, sv: units * d.price + cash });
      }
      if (d.isOverbought && sArm && i > 0) {
        var sell = units * (sellPct / 100), proc = sell * d.price;
        units -= sell; cash += proc; totalCashedOut += proc; sArm = false;
        sells.push({ date: d.date, price: d.price, amount: proc, sv: units * d.price + cash });
      }
      return Object.assign({}, d, { strategy: units * d.price + cash, hodl: hodlUnits * d.price });
    });

    // "No sells" pure-compounding path (adds at the lows, never trims).
    var pUnits = initialStake / all[0].price, pureCap = initialStake, pArm = true;
    var pure = all.map(function (d, i) {
      if (d.isProjection) return Object.assign({}, d, { pure: null });
      if (!pArm && d.logDev > -buyThreshold / 2) pArm = true;
      if (d.isOversold && pArm && i > 0) { pUnits += buyAmount / d.price; pureCap += buyAmount; pArm = false; }
      return Object.assign({}, d, { pure: pUnits * d.price });
    });

    var histSim = sim.filter(function (r) { return !r.isProjection; });
    var histPure = pure.filter(function (r) { return !r.isProjection; });
    var lhL = histSim[histSim.length - 1];
    var curS = lhL.strategy, curH = lhL.hodl, curPure = histPure[histPure.length - 1].pure;

    return {
      sim: sim, pure: pure, buys: buys, sells: sells,
      stats: {
        totalDeployed: totalDeployed, outOfPocket: outOfPocket, totalCashedOut: totalCashedOut,
        cash: cash, curS: curS, curH: curH, btcVal: curS - cash, curPure: curPure, pureCap: pureCap
      }
    };
  }

  // Convenience: the whole pipeline in one call, returning everything the
  // shell needs to render. Keeps the shell dumb (render only, no maths).
  function analyse(series, params) {
    if (!series || series.length < 10) return null;
    var reg = fitFrozenRegression(series, params);
    if (!reg) return null;
    var channel = buildChannel(series, reg, params);
    var run = simulate(channel, reg, params);
    var hist = channel.hist;
    var last = hist[hist.length - 1];
    return {
      reg: reg, channel: channel, run: run,
      currentSigma: last.logDev, trendNow: last.trend,
      lastPrice: series[series.length - 1].c, lastDate: channel.lastDate
    };
  }

  var api = { linReg: linReg, fitFrozenRegression: fitFrozenRegression,
              buildChannel: buildChannel, simulate: simulate, analyse: analyse };

  if (typeof module !== "undefined" && module.exports) module.exports = api; // node / tests
  global.GMI_COMPUTE = api;                                                  // browser shell
})(typeof window !== "undefined" ? window : globalThis);

</script>
<script>
// ===========================================================================
//  SOURCES  —  the asset registry + the data-source "socket".
//
//  THIS is the file that makes the dashboard portable across data providers.
//  The shell never talks to a data provider directly. It asks ONE function,
//  getAssetSeries(key), for a standard series of { d:"YYYY-MM-DD", c:number }.
//  That function dispatches to an ADAPTER chosen per-asset in ASSET_REGISTRY.
//
//  Swapping providers = change the `source` field on an asset, or add a new
//  adapter below. The dashboard, the compute module, and the render code never
//  change. (This is the seam that lets a team plug in their own internal feed
//  instead of TradingView, and the reason "we can't use NDX" is a one-line
//  config edit, not a rewrite.)
// ===========================================================================
(function (global) {
  "use strict";

  // ---- ASSET REGISTRY ------------------------------------------------------
  // One row per asset. To remove an asset (e.g. NDX licensing): delete its row.
  // To add one: copy a row, set the ticker, the source, and its frozen params.
  // To re-point an asset at a different provider: change `source` (+ symbol).
  var ASSET_REGISTRY = [
    {
      key: "BTC", name: "Bitcoin", ticker: "BTC", unit: "BTC", color: "#F6C343",
      source: "live",            // <- swap to "coingecko" for live, or "internal" for your feed
      symbol: "INDEX:BTCUSD",        // provider symbol (used by live adapters)
      projectToYear: 2035            // how far the forward channel extends
    },
    {
      key: "NDX", name: "Nasdaq 100", ticker: "NDX", unit: "units", color: "#60A5FA",
      source: "liveIndex",            // NDX stays on injected/pipeline data (no public live feed)
      symbol: "NASDAQ:NDX",
      yahoo: "%5ENDX",               // best-effort keyless live tip (beta only); native build uses RV's QQQ feed
      projectToYear: 2030
    }
  ];

  // Map any millisecond time to that week's Friday key "YYYY-MM-DD" (the tool's
  // weekly anchor). Shared by the live adapters so a live tip lands on the same
  // weekly grid as the embedded history.
  function fridayKey(ms) {
    var dt = new Date(ms), day = dt.getUTCDay();
    var fri = Date.UTC(dt.getUTCFullYear(), dt.getUTCMonth(), dt.getUTCDate() + ((5 - day + 7) % 7));
    var k = new Date(fri);
    return k.getUTCFullYear() + "-" + String(k.getUTCMonth() + 1).padStart(2, "0") + "-" + String(k.getUTCDate()).padStart(2, "0");
  }
  function embeddedSeries(asset) {
    return (((global.DASHBOARD_DATA || {}).assets || {})[asset.key] || {}).series || [];
  }
  // Append/replace today's live price as the current weekly point on top of the
  // embedded history. Keeps the frozen regression (built on history) intact.
  function withLiveTip(base, price, src) {
    if (!(price > 0)) return { series: base, live: false, src: "demo" };
    var out = base.slice(), k = fridayKey(Date.now());
    if (out.length && out[out.length - 1].d === k) out[out.length - 1] = { d: k, c: price };
    else out.push({ d: k, c: price });
    return { series: out, live: true, src: src };
  }

  // ---- ADAPTERS ------------------------------------------------------------
  // Every adapter returns a Promise of [{ d:"YYYY-MM-DD", c:number }, ...].
  // That uniform shape is the whole contract. Add providers here.
  //
  // FOR A PLATFORM BUILD: use `injected` or `platform` only. Both keep data
  // INSIDE Real Vision's platform — no external provider is contacted at
  // runtime. The `coingecko` adapter is an illustrative example of the socket
  // accepting any provider; delete it for production.
  var ADAPTERS = {

    // DEFAULT, production-aligned path: read the weekly series the platform
    // pipeline already wrote into data/data.js. This mirrors how the live
    // Everything Code dashboard reads window.TGL_DATA from data/data.js.
    // Nothing leaves the platform — the series is pre-supplied, not fetched.
    injected: function (asset) {
      var d = (global.DASHBOARD_DATA || {}).assets || {};
      var s = d[asset.key] && d[asset.key].series;
      return Promise.resolve(s || []);
    },

    // INTENDED PRODUCTION PATH for live data: fetch the weekly series from Real
    // Vision's own in-platform data service. Stub below — P&E wires the real
    // endpoint/shared-data client and maps the response to [{d,c}]. The rest of
    // the dashboard does not change. This is the answer to "it can't reference
    // data outside our platform": point this at the platform and it never does.
    platform: function (asset) {
      // e.g. return RVData.weeklyCloses(asset.symbol).then(rows =>
      //        rows.map(r => ({ d: r.date, c: r.close })));
      return Promise.reject(new Error("platform adapter not wired yet"));
    },

    // BETA-ONLY, external — remove for platform builds. Takes the embedded
    // weekly history as the base and refreshes the current price from a keyless,
    // browser-safe, US-reachable source (Coinbase spot, with Kraken as backup).
    // It does NOT use CoinGecko's historical endpoint, which now needs a paid key
    // (that was why the old build silently fell back to stale data). Returns
    // { series, live, src } so the UI can label honestly: "LIVE" only when the
    // feed actually answered, otherwise an honest "DEMO · as-of <date>".
    live: function (asset) {
      var base = embeddedSeries(asset);
      // Primary: Coinbase (keyless, CORS, US-friendly). Backup: Kraken.
      return fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot")
        .then(function (r) { if (!r.ok) throw 0; return r.json(); })
        .then(function (j) { return parseFloat(j.data.amount); })
        .catch(function () {
          return fetch("https://api.kraken.com/0/public/Ticker?pair=XBTUSD")
            .then(function (r) { return r.json(); })
            .then(function (j) { return parseFloat(j.result.XXBTZUSD.c[0]); });
        })
        .then(function (price) { return withLiveTip(base, price, "coinbase"); })
        .catch(function () { return { series: base, live: false, src: "demo" }; });
    },

    // BETA-ONLY, external, BEST-EFFORT — index/stock feeds rarely allow keyless
    // browser access (CORS), so this may not connect in every browser. Tries
    // Yahoo's chart endpoint for the asset's `yahoo` symbol to refresh the
    // current price; on any failure it falls back to honest demo data. The
    // RELIABLE answer for indices is the platform adapter (RV's QQQ end-of-day).
    liveIndex: function (asset) {
      var base = embeddedSeries(asset);
      var url = "https://query1.finance.yahoo.com/v8/finance/chart/" + (asset.yahoo || "") + "?range=1mo&interval=1d";
      return fetch(url)
        .then(function (r) { if (!r.ok) throw 0; return r.json(); })
        .then(function (j) {
          var res = j.chart.result[0], closes = res.indicators.quote[0].close, price = null;
          for (var i = closes.length - 1; i >= 0; i--) { if (closes[i] != null) { price = closes[i]; break; } }
          return withLiveTip(base, price, "yahoo");
        })
        .catch(function () { return { series: base, live: false, src: "demo" }; });
    }

    // internal: function (asset) { ... }   // <- a team drops their own feed in here.
    //   Must return Promise<[{d:"YYYY-MM-DD", c:number}]>. Nothing else changes.
  };

  // ---- THE ONE ENTRY POINT THE SHELL USES ---------------------------------
  // Falls back to the injected data if a live adapter errors, so the dashboard
  // degrades gracefully instead of going blank (same spirit as the pipeline's
  // "skip the asset, keep the rest" resilience).
  function getAssetSeries(key) {
    var asset = ASSET_REGISTRY.filter(function (a) { return a.key === key; })[0];
    if (!asset) return Promise.resolve({ series: [], source: "missing", live: false, asset: null });
    var adapter = ADAPTERS[asset.source] || ADAPTERS.injected;
    var asOf = (global.DASHBOARD_DATA || {}).updated || "";
    function injectedFallback() {
      return ADAPTERS.injected(asset).then(function (s) {
        return { series: s, source: "injected", live: false, asOf: asOf, asset: asset };
      });
    }
    return Promise.resolve(adapter(asset)).then(function (out) {
      // Adapters return either a bare series array or { series, live, src }.
      var series = Array.isArray(out) ? out : (out && out.series);
      var live = Array.isArray(out) ? false : !!(out && out.live);
      var src = Array.isArray(out) ? asset.source : ((out && out.src) || asset.source);
      if (series && series.length > 10) return { series: series, source: src, live: live, asOf: asOf, asset: asset };
      return injectedFallback();
    }).catch(injectedFallback);
  }

  global.GMI_SOURCES = {
    ASSET_REGISTRY: ASSET_REGISTRY,
    ADAPTERS: ADAPTERS,
    getAssetSeries: getAssetSeries
  };
})(typeof window !== "undefined" ? window : globalThis);

</script>

const fmt$=v=>v>=1e9?"$"+(v/1e9).toFixed(1)+"B":v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1e3?"$"+(v/1e3).toFixed(0)+"K":"$"+v.toFixed(0);

function Sl({label,value,onChange,min,max,step,pre="",suf="",editable=false}){

function CompoundingMachine(){

  const [sellPct, setSellPct] = useState(20);

  const meta = useMemo(()=>REGISTRY.filter(a=>a.key===assetKey)[0], [assetKey]);

  // Load the asset's series through the socket. The shell does not know or care
  // whether it came from injected pipeline data, CoinGecko, or an internal feed.
  useEffect(()=>{
    let cancelled=false; setLoading(true);
    getAssetSeries(assetKey).then(res=>{
      if(cancelled) return;
      setSeries(res.series);
      setSrcLabel(res.live ? "live" : ("demo · as-of " + (res.asOf||"")));
      setLoading(false);
    });
    return ()=>{ cancelled=true; };
  },[assetKey]);

  const analysis = useMemo(()=>{
    if(!series||series.length<10) return null;
    return COMPUTE.analyse(series, {
      startDate:"2017-09-01", freezeDate:"2025-12-31", projectToYear:meta.projectToYear,
      initialStake, buyThreshold, buyAmount, sellThreshold, sellPct
    });
  },[series, meta, initialStake, buyThreshold, buyAmount, sellThreshold, sellPct]);

  if(loading || !analysis) return(<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.lilac,fontFamily:"'Outfit',sans-serif"}}><div style={{fontSize:24}}>Loading price history...</div></div>);

  const { reg, run, currentSigma, trendNow, lastPrice, lastDate:div } = analysis;
  const { impliedCAGR, sd1pct } = reg;
  const { buys, sells, stats } = run;
  const { totalDeployed, outOfPocket, btcVal, cash, curH, curPure, pureCap } = stats;

  // Sample the full point set down for the charts (identical to the prototype).
  const all = run.sim, pure = run.pure;
  const step = Math.max(1, Math.floor(all.length/500));
  const cd = all.filter((_,i)=>i%step===0||i===all.length-1).map(d=>({date:d.date,price:d.price,trend:d.trend,upper1:d.upper1,lower1:d.lower1,upper2:d.upper2,lower2:d.lower2}));
  const histSim = all.filter(r=>!r.isProjection), histPure = pure.filter(r=>!r.isProjection);
  const pd = histSim.filter((_,i)=>i%step===0||i===histSim.length-1).map((d,idx,arr)=>{
    const pi=Math.round(idx*(histPure.length-1)/(arr.length-1));
    return {date:d.date,strategy:d.strategy,hodl:d.hodl,pure:(histPure[Math.min(pi,histPure.length-1)]||{}).pure ?? d.hodl};
  });

  const Tip=({active,payload})=>{if(!active||!payload?.length)return null;const d=payload[0]?.payload;if(!d)return null;
    return(<div style={{background:C.card,border:`1px solid ${C.border}`,padding:"10px 14px",borderRadius:8,fontSize:12,color:C.text,fontFamily:"'JetBrains Mono',monospace"}}>
      <div style={{color:C.muted,marginBottom:4}}>{fmtDate(d.date)}</div>
      {d.price!=null&&<div>Price: {fmtP(d.price)}</div>}{d.trend!=null&&<div style={{color:C.lilac}}>Trend: {fmtP(d.trend)}</div>}
      {d.strategy!=null&&<div style={{color:C.green}}>With sells: {fmt$(d.strategy)}</div>}
      {d.pure!=null&&<div style={{color:C.lilac}}>No sells: {fmt$(d.pure)}</div>}
      {d.hodl!=null&&<div style={{color:C.muted}}>HODL only: {fmt$(d.hodl)}</div>}
    </div>);};

  const St=({label,value,color=C.text,sub})=>(<div style={{textAlign:"center",padding:"12px 8px"}}>
    <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{label}</div>
    <div style={{fontSize:20,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace"}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{sub}</div>}</div>);

  const sigCol=currentSigma<-buyThreshold?C.green:currentSigma>sellThreshold?C.pink:C.text;
  const inBuyZone=currentSigma<-buyThreshold;
  const inSellZone=currentSigma>sellThreshold;
  const accentColor = meta.color;

  return(<div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Outfit',sans-serif",padding:"24px 20px"}}>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <div style={{maxWidth:1100,margin:"0 auto 28px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
        <div>
          <h1 style={{fontSize:28,fontWeight:700,margin:0,lineHeight:1.2}}>The GMI Compounding Machine</h1>
          <div style={{fontSize:13,color:meta.key==="NDX"?C.blue:C.lilac,textTransform:"uppercase",letterSpacing:"0.15em",marginTop:8,fontWeight:500}}>{meta.name} · Log Trend Strategy</div>
          <p style={{fontSize:14,color:C.muted,marginTop:8,maxWidth:700,lineHeight:1.5}}>
            Regression frozen end of 2025 ({impliedCAGR}% CAGR, 1σ = {sd1pct}%). Weekly signals, fixed dollar adds at the lows.
            {` Channel extends to ${meta.projectToYear} to show the band of possible prices.`}
          </p>
        </div>
        <div style={{display:"flex",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",flexShrink:0}}>
          {REGISTRY.map(m=>(
            <button key={m.key} onClick={()=>setAssetKey(m.key)} style={{
              padding:"10px 24px",fontSize:14,fontWeight:600,fontFamily:"'Outfit',sans-serif",
              background:assetKey===m.key?m.color+"18":"transparent",
              color:assetKey===m.key?m.color:C.muted,
              border:"none",cursor:"pointer",
              borderBottom:assetKey===m.key?`2px solid ${m.color}`:"2px solid transparent",
              transition:"all 0.2s ease",
            }}>{m.ticker}</button>
          ))}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto"}}>

      <div style={{background:inBuyZone?"rgba(74,222,128,0.06)":inSellZone?"rgba(243,71,113,0.06)":C.card,border:`1px solid ${inBuyZone?"rgba(74,222,128,0.3)":inSellZone?"rgba(243,71,113,0.3)":C.border}`,borderRadius:12,padding:"16px 24px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div>
          <span style={{fontSize:13,color:C.muted}}>{meta.ticker}: </span>
          <span style={{fontSize:20,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{fmtP(lastPrice)}</span>
          <span style={{fontSize:13,color:C.muted,marginLeft:16}}>Trend: </span>
          <span style={{fontSize:16,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:C.lilac}}>{fmtP(trendNow)}</span>
          <span style={{fontSize:13,color:C.muted,marginLeft:16}}>Distance: </span>
          <span style={{fontSize:14,fontFamily:"'JetBrains Mono',monospace"}}>{Math.round((lastPrice/trendNow-1)*100)}%</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:28,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:sigCol}}>{currentSigma>0?"+":""}{currentSigma.toFixed(1)}σ</span>
          {inBuyZone&&<span style={{fontSize:12,padding:"4px 10px",borderRadius:6,background:"rgba(74,222,128,0.15)",color:C.green,fontWeight:600}}>BUY ZONE</span>}
          {inSellZone&&<span style={{fontSize:12,padding:"4px 10px",borderRadius:6,background:"rgba(243,71,113,0.15)",color:C.pink,fontWeight:600}}>SELL ZONE</span>}
          <span style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:srcLabel.indexOf("live")===0?"rgba(74,222,128,0.12)":"rgba(136,136,170,0.12)",color:srcLabel.indexOf("live")===0?C.green:C.muted}}>{srcLabel}</span>
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 24px",marginBottom:28}}>
        <div style={{marginBottom:16}}><Sl label="Initial Investment" value={initialStake} onChange={setInitialStake} min={10000} max={1000000} step={25000} pre="$" editable/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
          <div>
            <div style={{fontSize:11,color:C.green,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:600,marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>Buy Zone</div>
            <Sl label="Buy when oversold by" value={buyThreshold} onChange={setBuyThreshold} min={0.5} max={2.0} step={0.1} suf="σ"/>
            <Sl label="Fixed amount to add each time" value={buyAmount} onChange={setBuyAmount} min={5000} max={1000000} step={25000} pre="$" editable/>
          </div>
          <div>
            <div style={{fontSize:11,color:C.gold,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:600,marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>Lifestyle Chips (set to 0% to disable)</div>
            <Sl label="Sell when overbought by" value={sellThreshold} onChange={setSellThreshold} min={0.5} max={2.0} step={0.1} suf="σ"/>
            <Sl label="Amount to sell" value={sellPct} onChange={setSellPct} min={0} max={50} step={5} suf={"% of " + meta.unit}/>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:1,marginBottom:28,background:C.border,borderRadius:12,overflow:"hidden"}}>
        <div style={{background:C.card,padding:4}}><St label="Total Invested" value={fmt$(totalDeployed)} color={C.lilac} sub={`${fmt$(initialStake)} initial + ${buys.length} × ${fmt$(buyAmount)}`}/></div>
        <div style={{background:C.card,padding:4}}><St label="Out of Pocket" value={fmt$(outOfPocket)} color={C.text} sub={`New money from you`}/></div>
        <div style={{background:C.card,padding:4}}><St label={`${meta.ticker} in Market`} value={fmt$(btcVal)} color={C.green} sub={`${(btcVal/totalDeployed).toFixed(0)}x total deployed`}/></div>
        <div style={{background:C.card,padding:4}}><St label="Cash from Sells" value={fmt$(cash)} color={C.gold} sub={sells.length>0?"Lifestyle or reload":"No sells yet"}/></div>
        <div style={{background:C.card,padding:4}}><St label="vs Just Holding" value={fmt$(curH)} color={C.muted} sub={`${(curH/initialStake).toFixed(0)}x initial only`}/></div>
        <div style={{background:C.card,padding:4}}><St label="No Sells Strategy" value={fmt$(curPure)} color={C.lilac} sub={`${fmt$(pureCap)} invested, ${(curPure/pureCap).toFixed(0)}x`}/></div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 12px 12px 0",marginBottom:24}}>
        <div style={{paddingLeft:20,marginBottom:12}}>
          <span style={{fontSize:15,fontWeight:600}}>{meta.ticker} Price vs Log Trend</span>
          <span style={{fontSize:12,color:C.muted,marginLeft:12}}>Frozen Dec '25 · Buy at -{buyThreshold}σ{sellPct>0?` · Sell at +${sellThreshold}σ`:""} · Forward channel shows possible price ranges, not a forecast</span>
        </div>
        <ResponsiveContainer width="100%" height={380}>
          <ComposedChart data={cd} margin={{top:5,right:20,bottom:5,left:10}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.grid}/>
            <XAxis dataKey="date" type="number" domain={["dataMin","dataMax"]} tickFormatter={fmtDate} stroke={C.muted} fontSize={10} fontFamily="'JetBrains Mono',monospace"/>
            <YAxis scale="log" domain={["auto","auto"]} tickFormatter={fmtP} stroke={C.muted} fontSize={10} fontFamily="'JetBrains Mono',monospace"/>
            <Tooltip content={<Tip/>}/>
            <Line dataKey="upper2" stroke={C.pink} strokeWidth={1.5} dot={false} strokeDasharray="2 5" opacity={0.75} type="monotone"/>
            <Line dataKey="lower2" stroke={C.pink} strokeWidth={1.5} dot={false} strokeDasharray="2 5" opacity={0.75} type="monotone"/>
            <Line dataKey="upper1" stroke={C.lilac} strokeWidth={1.5} dot={false} strokeDasharray="5 4" opacity={0.85} type="monotone"/>
            <Line dataKey="lower1" stroke={C.lilac} strokeWidth={1.5} dot={false} strokeDasharray="5 4" opacity={0.85} type="monotone"/>
            <Line dataKey="trend" stroke={C.lilac} strokeWidth={2} dot={false} type="monotone"/>
            <Line dataKey="price" stroke={accentColor} strokeWidth={1.8} dot={false} type="monotone" connectNulls={false}/>
            <ReferenceLine x={div} stroke={C.muted} strokeDasharray="8 4" opacity={0.5} label={{value:"now",position:"top",fill:C.muted,fontSize:10}}/>
            {buys.map((e,i)=><ReferenceDot key={`b${i}`} x={e.date} y={e.price} r={5} fill={C.green} stroke={C.bg} strokeWidth={1.5}/>)}
            {sells.map((e,i)=><ReferenceDot key={`s${i}`} x={e.date} y={e.price} r={5} fill={C.gold} stroke={C.bg} strokeWidth={1.5}/>)}
          </ComposedChart>
        </ResponsiveContainer>
        <div style={{display:"flex",gap:16,paddingLeft:20,paddingTop:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:accentColor}}>— Price</span><span style={{fontSize:11,color:C.lilac}}>— Trend</span>
          <span style={{fontSize:11,color:C.lilac,opacity:0.85}}>┄ ±1σ</span><span style={{fontSize:11,color:C.pink,opacity:0.75}}>┄ ±2σ</span>
          <span style={{fontSize:11,color:C.green}}>● Buy</span>{sellPct>0&&<span style={{fontSize:11,color:C.gold}}>● Sell</span>}
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 12px 12px 0",marginBottom:24}}>
        <div style={{paddingLeft:20,marginBottom:12}}>
          <span style={{fontSize:15,fontWeight:600}}>Portfolio Comparison</span>
          <span style={{fontSize:12,color:C.muted,marginLeft:12}}>Three approaches side by side</span>
        </div>
        <ResponsiveContainer width="100%" height={360}>
          <ComposedChart data={pd} margin={{top:5,right:20,bottom:5,left:10}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.grid}/>
            <XAxis dataKey="date" type="number" domain={["dataMin","dataMax"]} tickFormatter={fmtDate} stroke={C.muted} fontSize={10} fontFamily="'JetBrains Mono',monospace"/>
            <YAxis scale="log" domain={["auto","auto"]} tickFormatter={fmt$} stroke={C.muted} fontSize={10} fontFamily="'JetBrains Mono',monospace"/>
            <Tooltip content={<Tip/>}/>
            <Line dataKey="hodl" stroke={C.muted} strokeWidth={1.5} dot={false} type="monotone" strokeDasharray="4 4"/>
            {sellPct>0&&<Line dataKey="strategy" stroke={C.green} strokeWidth={2} dot={false} type="monotone"/>}
            <Line dataKey="pure" stroke={C.lilac} strokeWidth={2.5} dot={false} type="monotone"/>
            <ReferenceLine x={div} stroke={C.muted} strokeDasharray="8 4" opacity={0.4}/>
            {buys.map((e,i)=><ReferenceDot key={`pb${i}`} x={e.date} y={e.sv} r={5} fill={C.green} stroke={C.bg} strokeWidth={1.5}/>)}
            {sellPct>0&&sells.map((e,i)=><ReferenceDot key={`ps${i}`} x={e.date} y={e.sv} r={5} fill={C.gold} stroke={C.bg} strokeWidth={1.5}/>)}
          </ComposedChart>
        </ResponsiveContainer>
        <div style={{display:"flex",gap:16,paddingLeft:20,paddingTop:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:C.lilac}}>— Buy + Hold (no sells)</span>
          {sellPct>0&&<span style={{fontSize:11,color:C.green}}>— With lifestyle chips</span>}
          <span style={{fontSize:11,color:C.muted}}>┄ HODL only (initial, no adds)</span>
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:24}}>
        <div style={{fontSize:15,fontWeight:600,marginBottom:16}}>Signal History</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
          <div>
            <div style={{fontSize:12,color:C.green,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,fontWeight:600}}>Buy Signals ({buys.length}) — {fmt$(buyAmount)} each</div>
            <div style={{maxHeight:260,overflowY:"auto",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>
              {buys.map((e,i)=>(<div key={i} style={{padding:"5px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:C.muted}}>{fmtDateFull(e.date)}</span><span>{fmtP(e.price)}</span><span style={{color:C.green}}>+{fmt$(e.amount)}</span></div>))}
            </div>
          </div>
          <div>
            <div style={{fontSize:12,color:C.gold,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,fontWeight:600}}>Lifestyle Chips ({sells.length}){sellPct===0?" — DISABLED":""}</div>
            <div style={{maxHeight:260,overflowY:"auto",fontSize:12,fontFamily:"'JetBrains Mono',monospace"}}>
              {sells.length===0&&<div style={{color:C.muted,padding:8}}>No sells — pure compounding mode</div>}
              {sells.map((e,i)=>(<div key={i} style={{padding:"5px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:C.muted}}>{fmtDateFull(e.date)}</span><span>{fmtP(e.price)}</span><span style={{color:C.gold}}>-{fmt$(e.amount)}</span></div>))}
            </div>
          </div>
        </div>
      </div>

      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:24,fontSize:13,color:C.muted,lineHeight:1.7}}>
        <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:8}}>How it works</div>
        <p style={{margin:"0 0 8px"}}>
          Frozen log regression on weekly closes (Sept 2017–Dec 2025, {impliedCAGR}% CAGR, 1σ = {sd1pct}%). Each buy signal adds a fixed {fmt$(buyAmount)}. Sells trim {sellPct}% of {meta.unit} to cash. Cash stays in the system: it funds future buys first, reducing out-of-pocket cost.
        </p>
        <p style={{margin:0}}>
          The forward channel shows where the trend and the ±1σ / ±2σ bands sit in future months. It is not a price forecast. The bands simply show the range that statistically contains most of the historical action against the trend.
        </p>
      </div>
    </div>
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CompoundingMachine />);
</script>
</body>
</html>
