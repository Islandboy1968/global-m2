<title>The GMI Compounding Machine</title>
<!--
  GMI-branded shell of the Compounding Machine — the skin that accompanies the
  GMI dashboards (The Everything Code / Exponential Age). Same four-layer split
  as compounding-machine.html: this file is SHELL ONLY. It renders against the
  same three globals (DASHBOARD_DATA / GMI_COMPUTE / GMI_SOURCES); the data
  contract, compute maths, and sources registry are shared with the RV-styled
  shell and never forked. Brand tokens mirror the live GMI dashboard
  (../index.html): white page, pink #f12a5a accent, Teko titles, AT Aero body,
  DM Mono labels + tabular numerals, pink-gradient chart panels.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Teko:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* GMI brand fonts — served from the repo's fonts/ dir (same files the main
     dashboard uses). Falls back to system sans if the file is viewed standalone. */
  @font-face{font-family:"AT Aero";src:url("../fonts/AtAero-Regular.woff2") format("woff2"),url("../fonts/AtAero-Regular.woff") format("woff");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"AT Aero";src:url("../fonts/AtAero-Medium.woff2") format("woff2"),url("../fonts/AtAero-Medium.woff") format("woff");font-weight:500;font-style:normal;font-display:swap}
  @font-face{font-family:"Teko";src:url("../fonts/Teko-Regular.woff2") format("woff2");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"Teko";src:url("../fonts/Teko-Medium.woff2") format("woff2");font-weight:500;font-style:normal;font-display:swap}
  @font-face{font-family:"Teko";src:url("../fonts/Teko-SemiBold.woff2") format("woff2");font-weight:600;font-style:normal;font-display:swap}
  :root{
    --pink:#f12a5a; --ink:#131316;
    --mut:rgba(19,19,22,.72); --mut2:rgba(19,19,22,.58); --faint:rgba(19,19,22,.45);
    --line:rgba(19,19,22,.12); --grid:rgba(19,19,22,.07);
    --panel:linear-gradient(180deg,#ECC2EA 0%,#F8DDEF 60%,#FBE7F2 100%);
    --green:#15803d; --red:#c81e1e; --gold:#b45309; --purple:#7c3aed;
    --mono:'DM Mono',monospace;
    --sans:"AT Aero",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --title:'Teko',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#ffffff;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  #root{min-height:100vh;}
  #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--mut);font-size:16px;font-family:var(--mono);letter-spacing:.02em;}

  /* range sliders — pink fill, white thumb (GMI) */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;
    background:linear-gradient(to right,var(--pink) 0%,var(--pink) var(--pct,50%),var(--line) var(--pct,50%),var(--line) 100%);
    cursor:pointer;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;
    background:#fff;border:1px solid var(--line);box-shadow:0 1px 4px rgba(19,19,22,.25);cursor:pointer;transition:transform .12s ease;}
  input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.12);}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:1px solid var(--line);box-shadow:0 1px 4px rgba(19,19,22,.25);cursor:pointer;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(19,19,22,.18);border-radius:99px;border:2px solid #fff;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(19,19,22,.3);}

  .recharts-cartesian-axis-tick text{font-family:var(--mono);}

  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:24px;}
  @media (max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:560px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;}
  @media (max-width:680px){.ctrl-grid{grid-template-columns:1fr;gap:8px;}}
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;
const { ComposedChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, ReferenceLine, ReferenceDot } = Recharts;

// GMI light palette — token-for-token from the live dashboard (../index.html).
const C = {
  ink:"#131316", mut:"rgba(19,19,22,.72)", mut2:"rgba(19,19,22,.58)", faint:"rgba(19,19,22,.45)",
  line:"rgba(19,19,22,.12)", grid:"rgba(19,19,22,.07)",
  pink:"#f12a5a", green:"#15803d", red:"#c81e1e", gold:"#b45309", purple:"#7c3aed",
  buyDot:"#16a34a", sellDot:"#dc2626",
  panel:"linear-gradient(180deg,#ECC2EA 0%,#F8DDEF 60%,#FBE7F2 100%)",
};
const MONO="'DM Mono',monospace";
const SANS='"AT Aero",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif';
const TITLE="'Teko',sans-serif";

const REGISTRY = window.GMI_SOURCES.ASSET_REGISTRY;
const getAssetSeries = window.GMI_SOURCES.getAssetSeries;
const COMPUTE = window.GMI_COMPUTE;

const fmt$=v=>v>=1e9?"$"+(v/1e9).toFixed(1)+"B":v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1e3?"$"+(v/1e3).toFixed(0)+"K":"$"+v.toFixed(0);
const fmtP=v=>v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1e3?"$"+(v/1e3).toFixed(0)+"K":"$"+v.toFixed(0);
const fmtDate=ts=>new Date(ts).toLocaleDateString("en-US",{month:"short",year:"2-digit"});
const fmtDateFull=ts=>new Date(ts).toLocaleDateString("en-US",{day:"numeric",month:"short",year:"numeric"});

// log ticks at powers of 10, only those INSIDE the padded domain so the axis
// hugs the data instead of being stretched up an empty decade by an out-of-range tick.
function logTicks(min,max){
  if(!(min>0)||!(max>min)) return undefined;
  const loD=min*0.9, hiD=max*1.1, t=[];
  for(let e=Math.floor(Math.log10(min)); e<=Math.ceil(Math.log10(max)); e++){
    const v=Math.pow(10,e);
    if(v>=loD && v<=hiD) t.push(v);
  }
  return t.length?t:undefined;
}
function yearTicks(min,max){
  const a=new Date(min).getFullYear(), b=new Date(max).getFullYear(), t=[];
  const step=(b-a)>14?3:2;
  for(let y=Math.ceil(a/step)*step;y<=b;y+=step) t.push(new Date(y,0,1).getTime());
  return t;
}

// ---------- atoms ----------
function Eyebrow({children,color=C.mut,style}){
  return <div style={{fontFamily:MONO,fontSize:11.5,letterSpacing:".2em",textTransform:"uppercase",color,fontWeight:500,...style}}>{children}</div>;
}

function Segmented({options,value,onChange,size="md"}){
  const pad = size==="sm"?"6px 14px":"7px 18px";
  const fs = size==="sm"?15:18;
  return(
    <div style={{display:"inline-flex",background:"#fff",border:`1px solid ${C.line}`,borderRadius:8,padding:3,gap:2}}>
      {options.map(o=>{
        const on=o.value===value;
        return <button key={o.value} onClick={()=>onChange(o.value)} style={{
          padding:pad,fontSize:fs,fontWeight:400,fontFamily:TITLE,letterSpacing:".04em",lineHeight:1,
          background:on?C.ink:"transparent",color:on?"#fff":C.mut,
          border:"1px solid transparent",borderRadius:6,cursor:"pointer",
          transition:"all .18s cubic-bezier(0.22,1,0.36,1)",whiteSpace:"nowrap",
        }}>{o.label}</button>;
      })}
    </div>
  );
}

function Pill({children,tone="neutral"}){
  const map={
    buy:{bg:"rgba(22,163,74,0.08)",bd:"rgba(22,163,74,0.4)",fg:C.green},
    sell:{bg:"rgba(220,38,38,0.07)",bd:"rgba(220,38,38,0.35)",fg:C.red},
    live:{bg:"rgba(22,163,74,0.08)",bd:"rgba(22,163,74,0.35)",fg:C.green},
    neutral:{bg:"rgba(19,19,22,0.05)",bd:C.line,fg:C.mut},
  }[tone];
  return <span style={{display:"inline-flex",alignItems:"center",gap:6,fontFamily:MONO,fontSize:11,fontWeight:500,letterSpacing:".08em",
    textTransform:"uppercase",padding:"5px 11px",borderRadius:99,background:map.bg,border:`1px solid ${map.bd}`,color:map.fg}}>{children}</span>;
}

function Card({children,style,pad=24,tone="plain"}){
  const bg = tone==="panel"?C.panel:"#fff";
  return <div style={{background:bg,border:`1px solid ${C.line}`,borderRadius:6,padding:pad,...style}}>{children}</div>;
}

function SectionHead({num,title,cap}){
  return <div style={{display:"flex",flexWrap:"wrap",alignItems:"baseline",gap:"4px 12px",margin:"30px 0 9px"}}>
    <div style={{flexBasis:"100%",fontFamily:MONO,fontSize:11,fontWeight:500,letterSpacing:"2px",color:C.pink}}>{num}</div>
    <h2 style={{fontFamily:TITLE,fontWeight:400,fontSize:30,lineHeight:1,margin:0,color:C.ink}}>{title}</h2>
    {cap&&<div style={{marginLeft:"auto",fontFamily:MONO,fontSize:12.5,color:C.mut,textAlign:"right"}}>{cap}</div>}
  </div>;
}

function Slider({label,value,onChange,min,max,step,pre="",suf="",editable=false,accent=C.pink}){
  const [draft,setDraft]=useState(null);
  const pct=((value-min)/(max-min))*100;
  const display=draft!==null?draft:(typeof value==='number'&&value>=1000?value.toLocaleString():String(value));
  const commit=()=>{
    if(draft===null)return;
    const raw=draft.replace(/[^0-9.]/g,"");
    if(raw===""){setDraft(null);return;}
    const n=Number(raw); if(isNaN(n)){setDraft(null);return;}
    onChange(Math.max(min,Math.min(max,n))); setDraft(null);
  };
  return(<div style={{marginBottom:20}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{fontSize:14.5,color:C.mut,fontWeight:500}}>{label}</span>
      {editable?(
        <div style={{display:"flex",alignItems:"center",background:"#fff",border:`1px solid ${C.line}`,borderRadius:7,padding:"3px 10px"}}>
          {pre&&<span style={{fontSize:13,color:C.mut2,fontFamily:MONO}}>{pre}</span>}
          <input type="text" inputMode="numeric" value={display}
            onChange={e=>setDraft(e.target.value)} onBlur={commit}
            onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
            style={{background:"transparent",border:"none",outline:"none",color:C.ink,fontFamily:MONO,fontWeight:500,fontSize:16,width:100,textAlign:"right",padding:"2px 0"}}/>
          {suf&&<span style={{fontSize:13,color:C.mut2,fontFamily:MONO,marginLeft:3}}>{suf}</span>}
        </div>
      ):(
        <span style={{fontSize:16,color:C.ink,fontFamily:MONO,fontWeight:500}}>{pre}{typeof value==='number'&&value>=1000?value.toLocaleString():value}{suf}</span>
      )}
    </div>
    <input type="range" min={min} max={max} step={step} value={value}
      onChange={e=>onChange(Number(e.target.value))}
      style={{"--pct":pct+"%",background:`linear-gradient(to right,${accent} 0%,${accent} ${pct}%,${C.line} ${pct}%,${C.line} 100%)`}}/>
  </div>);
}

function SummaryTile({label,children,sub}){
  return <div style={{flex:"1 1 0",minWidth:130,padding:"4px 22px"}}>
    <Eyebrow style={{marginBottom:10}}>{label}</Eyebrow>
    <div>{children}</div>
    {sub&&<div style={{fontSize:12.5,color:C.mut2,marginTop:8}}>{sub}</div>}
  </div>;
}

function Stat({label,value,color=C.ink,sub}){
  return <div style={{background:"#fff",padding:"18px 18px 16px"}}>
    <Eyebrow style={{marginBottom:14}}>{label}</Eyebrow>
    <div style={{fontSize:25,fontWeight:500,color,fontFamily:MONO,letterSpacing:"-.01em",lineHeight:1}}>{value}</div>
    <div style={{height:1,background:C.line,margin:"14px 0 10px"}}></div>
    <div style={{fontSize:12.5,color:C.mut,lineHeight:1.4}}>{sub}</div>
  </div>;
}

function ChartLegend({items}){
  return <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:20,marginBottom:6}}>
    {items.map((it,i)=>(
      <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
        {it.dot
          ? <span style={{width:10,height:10,borderRadius:99,background:it.color,display:"inline-block",boxShadow:"0 0 0 2px #fff"}}></span>
          : <span style={{width:22,height:0,borderTop:`${it.w||2}px ${it.dash?"dashed":"solid"} ${it.color}`,display:"inline-block"}}></span>}
        <span style={{fontFamily:SANS,fontSize:14,color:it.strong?C.ink:C.mut,fontWeight:500}}>{it.label}</span>
      </div>
    ))}
  </div>;
}

function CompoundingMachine(){
  const [assetKey,setAssetKey]=useState(REGISTRY[0].key);
  const [series,setSeries]=useState(null);
  const [srcLabel,setSrcLabel]=useState("");
  const [live,setLive]=useState(false);
  const [loading,setLoading]=useState(true);
  const [initialStake,setInitialStake]=useState(100000);
  const [buyThreshold,setBuyThreshold]=useState(1.0);
  const [buyAmount,setBuyAmount]=useState(25000);
  const [sellThreshold,setSellThreshold]=useState(1.0);
  const [sellPct,setSellPct]=useState(20);

  const meta=useMemo(()=>REGISTRY.filter(a=>a.key===assetKey)[0],[assetKey]);

  useEffect(()=>{
    let cancelled=false; setLoading(true);
    getAssetSeries(assetKey).then(res=>{
      if(cancelled)return;
      setSeries(res.series); setLive(!!res.live);
      setSrcLabel(res.live?("Live · "+res.source):("Demo · as of "+(res.asOf||"")));
      setLoading(false);
    }).catch(()=>{
      if(cancelled)return;
      const emb=((window.DASHBOARD_DATA||{}).assets||{})[assetKey];
      setSeries(emb?emb.series:[]); setLive(false);
      setSrcLabel("Demo · as of "+((window.DASHBOARD_DATA||{}).updated||""));
      setLoading(false);
    });
    return ()=>{cancelled=true;};
  },[assetKey]);

  const analysis=useMemo(()=>{
    if(!series||series.length<10)return null;
    return COMPUTE.analyse(series,{
      startDate:"2017-09-01",freezeDate:"2025-12-31",projectToYear:meta.projectToYear,
      initialStake,buyThreshold,buyAmount,sellThreshold,sellPct
    });
  },[series,meta,initialStake,buyThreshold,buyAmount,sellThreshold,sellPct]);

  if(loading||!analysis) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.mut,fontSize:16,fontFamily:MONO,letterSpacing:".02em"}}>
      Loading price history…</div>);

  const {reg,run,currentSigma,trendNow,lastPrice,lastDate}=analysis;
  const {impliedCAGR,sd1pct}=reg;
  const {buys,sells,stats}=run;
  const {totalDeployed,outOfPocket,btcVal,cash,curH,curPure,pureCap}=stats;

  const all=run.sim, pure=run.pure;
  const step=Math.max(1,Math.floor(all.length/500));
  const cd=all.filter((_,i)=>i%step===0||i===all.length-1).map(d=>({date:d.date,price:d.price,trend:d.trend,upper1:d.upper1,lower1:d.lower1,upper2:d.upper2,lower2:d.lower2}));
  const histSim=all.filter(r=>!r.isProjection), histPure=pure.filter(r=>!r.isProjection);
  const pd=histSim.filter((_,i)=>i%step===0||i===histSim.length-1).map((d,idx,arr)=>{
    const pi=Math.round(idx*(histPure.length-1)/(arr.length-1));
    return {date:d.date,strategy:d.strategy,hodl:d.hodl,pure:(histPure[Math.min(pi,histPure.length-1)]||{}).pure ?? d.hodl};
  });

  // domains
  const priceVals=cd.flatMap(d=>[d.price,d.trend,d.upper2,d.lower2]).filter(v=>v>0);
  const pMin=Math.min(...priceVals), pMax=Math.max(...priceVals);
  const valVals=pd.flatMap(d=>[d.strategy,d.pure,d.hodl]).filter(v=>v>0);
  const vMin=Math.min(...valVals), vMax=Math.max(...valVals);
  const xMin=cd[0].date, xMax=cd[cd.length-1].date;
  const xMinV=pd[0].date, xMaxV=pd[pd.length-1].date;

  const sigCol=currentSigma<-buyThreshold?C.green:currentSigma>sellThreshold?C.red:C.ink;
  const inBuyZone=currentSigma<-buyThreshold;
  const inSellZone=currentSigma>sellThreshold;
  const distPct=Math.round((lastPrice/trendNow-1)*100);
  const distCol=distPct<0?C.red:C.green;

  const Tip=({active,payload})=>{if(!active||!payload?.length)return null;const d=payload[0]?.payload;if(!d)return null;
    return(<div style={{background:"rgba(255,255,255,0.97)",border:`1px solid ${C.line}`,padding:"11px 14px",borderRadius:8,fontSize:13,color:C.ink,fontFamily:MONO,boxShadow:"0 2px 10px rgba(19,19,22,.08)"}}>
      <div style={{color:C.mut,marginBottom:6,letterSpacing:".02em"}}>{fmtDate(d.date)}</div>
      {d.price!=null&&<div style={{color:C.ink}}>Price&nbsp; {fmtP(d.price)}</div>}
      {d.trend!=null&&<div style={{color:C.pink}}>Trend&nbsp; {fmtP(d.trend)}</div>}
      {d.strategy!=null&&<div style={{color:C.green}}>With sells&nbsp; {fmt$(d.strategy)}</div>}
      {d.pure!=null&&<div style={{color:C.purple}}>No sells&nbsp; {fmt$(d.pure)}</div>}
      {d.hodl!=null&&<div style={{color:C.mut}}>HODL only&nbsp; {fmt$(d.hodl)}</div>}
    </div>);};

  const div=C.line;

  return(
  <div style={{minHeight:"100vh",padding:"0 0 64px"}}>
    {/* GMI top accent bar */}
    <div style={{height:5,background:C.pink,width:"100%"}}></div>

    <div style={{maxWidth:1000,margin:"0 auto",padding:"0 24px"}}>

      {/* BRAND ROW */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"22px 0 8px",borderBottom:`1px solid ${C.line}`}}>
        <span style={{fontFamily:TITLE,fontWeight:400,fontSize:27,lineHeight:1,letterSpacing:".5px",color:C.ink}}>GMI</span>
        <span style={{fontFamily:MONO,fontWeight:500,fontSize:11,letterSpacing:"3px",textTransform:"uppercase",color:C.ink}}>Global Macro Investor</span>
      </div>

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:20,margin:"26px 0 18px"}}>
        <div style={{maxWidth:680}}>
          <div style={{fontFamily:MONO,fontWeight:500,fontSize:12,letterSpacing:"3px",textTransform:"uppercase",color:C.pink,marginBottom:7}}>{meta.name} · Log Trend Strategy</div>
          <h1 style={{fontFamily:TITLE,fontWeight:400,fontSize:46,margin:0,lineHeight:.95,letterSpacing:0,color:C.ink}}>The GMI Compounding Machine</h1>
          <p style={{fontFamily:MONO,fontSize:13,color:C.mut,marginTop:12,marginBottom:0,lineHeight:1.6,maxWidth:580}}>
            Regression frozen end of 2025 — <span style={{color:C.ink}}>{impliedCAGR}%</span> CAGR, 1σ = <span style={{color:C.ink}}>{sd1pct}%</span>.
            Weekly signals, fixed-dollar adds at the lows. The channel extends to {meta.projectToYear} to show the band of possible prices — not a forecast.
          </p>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:12}}>
          <Pill tone={live?"live":"neutral"}>
            <span style={{width:7,height:7,borderRadius:99,background:live?"#34c759":C.faint}}></span>
            {live?"Live":"Beta · demo data"}
          </Pill>
          <Segmented options={REGISTRY.map(m=>({value:m.key,label:m.ticker}))} value={assetKey} onChange={setAssetKey}/>
        </div>
      </div>

      {/* STATUS STRIP — GMI summary tiles */}
      <Card pad={0} tone="panel" style={{marginBottom:24,
        borderColor:inBuyZone?"rgba(22,163,74,0.45)":inSellZone?"rgba(220,38,38,0.4)":C.line}}>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"stretch",padding:"22px 8px"}}>
          <SummaryTile label={`${meta.ticker} Price`} sub={fmtDateFull(lastDate)}>
            <span style={{fontSize:28,fontWeight:500,fontFamily:MONO,letterSpacing:"-.01em",color:C.ink}}>{fmtP(lastPrice)}</span>
          </SummaryTile>
          <div style={{width:1,background:div,alignSelf:"stretch",margin:"2px 0"}}></div>
          <SummaryTile label="Log Trend" sub="Fair value, frozen Dec '25">
            <span style={{fontSize:28,fontWeight:500,fontFamily:MONO,color:C.ink,letterSpacing:"-.01em"}}>{fmtP(trendNow)}</span>
          </SummaryTile>
          <div style={{width:1,background:div,alignSelf:"stretch",margin:"2px 0"}}></div>
          <SummaryTile label="Distance to Trend" sub="Price vs fair value">
            <span style={{fontSize:28,fontWeight:500,fontFamily:MONO,color:distCol,letterSpacing:"-.01em"}}>{distPct>0?"+":""}{distPct}%</span>
          </SummaryTile>
          <div style={{width:1,background:div,alignSelf:"stretch",margin:"2px 0"}}></div>
          <SummaryTile label="Signal">
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontSize:30,fontWeight:500,fontFamily:MONO,color:sigCol,letterSpacing:"-.02em"}}>{currentSigma>0?"+":""}{currentSigma.toFixed(1)}σ</span>
              {inBuyZone&&<Pill tone="buy">Buy zone</Pill>}
              {inSellZone&&<Pill tone="sell">Sell zone</Pill>}
              {!inBuyZone&&!inSellZone&&<Pill tone="neutral">Neutral</Pill>}
            </div>
          </SummaryTile>
        </div>
      </Card>

      {/* CONTROLS */}
      <SectionHead num="01" title="Your Plan" cap="size the stake, the dips, and the lifestyle chips"/>
      <Card style={{marginBottom:24}}>
        <Slider label="Initial Investment" value={initialStake} onChange={setInitialStake} min={10000} max={1000000} step={25000} pre="$" editable/>
        <div style={{height:1,background:C.line,margin:"6px 0 22px"}}></div>
        <div className="ctrl-grid">
          <div>
            <Eyebrow color={C.green} style={{marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.line}`}}>Buy Zone</Eyebrow>
            <Slider label="Buy when oversold by" value={buyThreshold} onChange={setBuyThreshold} min={0.5} max={2.0} step={0.1} suf="σ" accent={C.green}/>
            <Slider label="Fixed amount to add each time" value={buyAmount} onChange={setBuyAmount} min={5000} max={1000000} step={25000} pre="$" editable accent={C.green}/>
          </div>
          <div>
            <Eyebrow color={C.red} style={{marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.line}`}}>Lifestyle Chips · set to 0% to disable</Eyebrow>
            <Slider label="Sell when overbought by" value={sellThreshold} onChange={setSellThreshold} min={0.5} max={2.0} step={0.1} suf="σ" accent={C.red}/>
            <Slider label="Amount to sell" value={sellPct} onChange={setSellPct} min={0} max={50} step={5} suf={"% of "+meta.unit} accent={C.red}/>
          </div>
        </div>
      </Card>

      {/* KPI GRID */}
      <div className="kpi-grid">
        <Stat label="Total Invested" value={fmt$(totalDeployed)} color={C.pink} sub={`${fmt$(initialStake)} initial + ${buys.length} × ${fmt$(buyAmount)}`}/>
        <Stat label="Out of Pocket" value={fmt$(outOfPocket)} color={C.ink} sub="New money from you"/>
        <Stat label={`${meta.ticker} in Market`} value={fmt$(btcVal)} color={C.green} sub={`${(btcVal/totalDeployed).toFixed(1)}× total deployed`}/>
        <Stat label="Cash from Sells" value={fmt$(cash)} color={C.gold} sub={sells.length>0?"Lifestyle or reload":"No sells yet"}/>
        <Stat label="vs Just Holding" value={fmt$(curH)} color={C.mut} sub={`${(curH/initialStake).toFixed(1)}× initial only`}/>
        <Stat label="No-Sells Strategy" value={fmt$(curPure)} color={C.purple} sub={`${fmt$(pureCap)} invested · ${(curPure/pureCap).toFixed(1)}×`}/>
      </div>

      {/* CHART 1 — price vs trend */}
      <SectionHead num="02" title={`${meta.ticker} Price vs Log Trend`}
        cap={`Frozen Dec '25 · buy at −${buyThreshold}σ · sell at +${sellThreshold}σ · forward channel = possible ranges, not a forecast`}/>
      <Card tone="panel" style={{marginBottom:24,padding:"18px 22px 14px"}}>
        <ChartLegend items={[
          {color:C.ink,label:`${meta.ticker} price`,strong:true},
          {color:C.pink,label:"Log trend",dash:true},
          {color:C.purple,label:"±1σ band",dash:true,w:1.5},
          {color:C.mut2,label:"±2σ band",dash:true,w:1.5},
          {color:C.buyDot,label:`Buys (${buys.length})`,dot:true,strong:true},
          ...(sells.length?[{color:C.sellDot,label:`Sells (${sells.length})`,dot:true,strong:true}]:[]),
        ]}/>
        <ResponsiveContainer width="100%" height={400}>
          <ComposedChart data={cd} margin={{top:8,right:16,left:8,bottom:4}}>
            <CartesianGrid stroke={C.grid} vertical={false}/>
            <XAxis dataKey="date" type="number" scale="time" domain={[xMin,xMax]} ticks={yearTicks(xMin,xMax)}
              tickFormatter={fmtDate} stroke={C.mut2} tick={{fill:C.mut,fontSize:12.5}} tickLine={false} axisLine={{stroke:C.line}}/>
            <YAxis scale="log" domain={[pMin*0.9,pMax*1.1]} ticks={logTicks(pMin,pMax)} tickFormatter={fmtP}
              stroke={C.mut2} tick={{fill:C.mut,fontSize:12.5}} tickLine={false} axisLine={false} width={56}/>
            <Tooltip content={<Tip/>}/>
            <ReferenceLine x={lastDate} stroke={C.line} strokeDasharray="3 4" label={{value:"now",fill:C.mut2,fontSize:10,position:"insideTopRight"}}/>
            <Line dataKey="upper2" stroke={C.mut2} strokeWidth={1} strokeDasharray="1 5" dot={false} connectNulls isAnimationActive={false}/>
            <Line dataKey="lower2" stroke={C.mut2} strokeWidth={1} strokeDasharray="1 5" dot={false} connectNulls isAnimationActive={false}/>
            <Line dataKey="upper1" stroke={C.purple} strokeWidth={1.25} strokeDasharray="4 5" dot={false} connectNulls isAnimationActive={false} opacity={0.6}/>
            <Line dataKey="lower1" stroke={C.purple} strokeWidth={1.25} strokeDasharray="4 5" dot={false} connectNulls isAnimationActive={false} opacity={0.6}/>
            <Line dataKey="trend" stroke={C.pink} strokeWidth={1.5} strokeDasharray="6 5" dot={false} connectNulls isAnimationActive={false} opacity={0.9}/>
            <Line dataKey="price" stroke={C.ink} strokeWidth={2} dot={false} connectNulls isAnimationActive={false}/>
            {buys.map((b,i)=>(<ReferenceDot key={"buy"+i} x={b.date} y={b.price} r={5} fill={C.buyDot} stroke="#fff" strokeWidth={1.75} isFront ifOverflow="extendDomain"/>))}
            {sells.map((s,i)=>(<ReferenceDot key={"sell"+i} x={s.date} y={s.price} r={5} fill={C.sellDot} stroke="#fff" strokeWidth={1.75} isFront ifOverflow="extendDomain"/>))}
          </ComposedChart>
        </ResponsiveContainer>
      </Card>

      {/* CHART 2 — strategy value */}
      <SectionHead num="03" title="Portfolio Value · Strategy vs Holding"
        cap={`Log scale · same ${fmt$(initialStake)} starting stake`}/>
      <Card tone="panel" style={{marginBottom:8,padding:"18px 22px 14px"}}>
        <ChartLegend items={[
          {color:C.green,label:"With sells (lifestyle)",strong:true},
          {color:C.purple,label:"No sells (pure compound)",strong:true},
          {color:C.mut,label:"HODL only",w:1.5},
        ]}/>
        <ResponsiveContainer width="100%" height={340}>
          <ComposedChart data={pd} margin={{top:8,right:16,left:8,bottom:4}}>
            <CartesianGrid stroke={C.grid} vertical={false}/>
            <XAxis dataKey="date" type="number" scale="time" domain={[xMinV,xMaxV]} ticks={yearTicks(xMinV,xMaxV)}
              tickFormatter={fmtDate} stroke={C.mut2} tick={{fill:C.mut,fontSize:12.5}} tickLine={false} axisLine={{stroke:C.line}}/>
            <YAxis scale="log" domain={[vMin*0.9,vMax*1.1]} ticks={logTicks(vMin,vMax)} tickFormatter={fmt$}
              stroke={C.mut2} tick={{fill:C.mut,fontSize:12.5}} tickLine={false} axisLine={false} width={56}/>
            <Tooltip content={<Tip/>}/>
            <Line dataKey="hodl" stroke={C.mut} strokeWidth={1.5} dot={false} isAnimationActive={false} opacity={0.7}/>
            <Line dataKey="pure" stroke={C.purple} strokeWidth={2} dot={false} isAnimationActive={false}/>
            <Line dataKey="strategy" stroke={C.green} strokeWidth={2} dot={false} isAnimationActive={false}/>
          </ComposedChart>
        </ResponsiveContainer>
      </Card>

      {/* SIGNAL HISTORY */}
      <SectionHead num="04" title="Signal History" cap="every historical add and trim"/>
      <Card style={{marginBottom:24}}>
        <div className="ctrl-grid">
          <div>
            <Eyebrow color={C.green} style={{marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.line}`}}>Buys ({buys.length}) · {fmt$(buyAmount)} each</Eyebrow>
            <div style={{maxHeight:240,overflowY:"auto",fontFamily:MONO,fontSize:13.5}}>
              {buys.map((e,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",gap:8,padding:"6px 2px",borderBottom:`1px solid ${C.grid}`}}>
                  <span style={{color:C.mut}}>{fmtDateFull(e.date)}</span>
                  <span style={{color:C.ink}}>{fmtP(e.price)}</span>
                  <span style={{color:C.buyDot}}>+{fmt$(e.amount)}</span>
                </div>
              ))}
            </div>
          </div>
          <div>
            <Eyebrow color={C.red} style={{marginBottom:12,paddingBottom:10,borderBottom:`1px solid ${C.line}`}}>Sells ({sells.length}){sellPct===0?" · disabled":""}</Eyebrow>
            <div style={{maxHeight:240,overflowY:"auto",fontFamily:MONO,fontSize:13.5}}>
              {sells.length===0&&<div style={{color:C.mut2,padding:"8px 2px"}}>No sells — pure compounding mode</div>}
              {sells.map((e,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",gap:8,padding:"6px 2px",borderBottom:`1px solid ${C.grid}`}}>
                  <span style={{color:C.mut}}>{fmtDateFull(e.date)}</span>
                  <span style={{color:C.ink}}>{fmtP(e.price)}</span>
                  <span style={{color:C.sellDot}}>−{fmt$(e.amount)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </Card>

      {/* HOW TO USE */}
      <SectionHead num="05" title="How to Use It"/>
      <Card style={{marginBottom:8,borderLeft:`4px solid ${C.pink}`}}>
        <div style={{fontFamily:SANS,fontSize:15,fontWeight:500,color:C.mut,lineHeight:1.7,maxWidth:900}}>
          <p style={{margin:"0 0 12px"}}>
            The big <span style={{color:C.ink,fontFamily:MONO}}>σ</span> reading at the top is the whole signal — how far price sits from its long-run trend. Below <span style={{color:C.green}}>−{buyThreshold}σ</span> is the <span style={{color:C.green}}>buy zone</span> (stretched cheap); above <span style={{color:C.red}}>+{sellThreshold}σ</span> is the <span style={{color:C.red}}>sell zone</span>. Green dots on the chart mark historical adds, red dots mark trims.
          </p>
          <p style={{margin:"0 0 12px"}}>
            The trend is a <span style={{color:C.ink}}>frozen log-linear regression</span> on weekly closes (Sept 2017 → Dec 2025: <span style={{color:C.ink,fontFamily:MONO}}>{impliedCAGR}%</span> CAGR, 1σ = <span style={{color:C.ink,fontFamily:MONO}}>{sd1pct}%</span>). Each buy signal adds a fixed <span style={{color:C.ink,fontFamily:MONO}}>{fmt$(buyAmount)}</span> at the lows; the optional “lifestyle chips” trim <span style={{color:C.ink,fontFamily:MONO}}>{sellPct}%</span> of holdings when overbought. Cash from trims funds the next buys first — which is why <span style={{color:C.ink}}>Out of Pocket</span> can sit well below <span style={{color:C.ink}}>Total Invested</span>. The <span style={{color:C.purple}}>No-Sells</span> line is pure compounding: adds at the lows, never trimming.
          </p>
          <p style={{margin:0}}>
            The forward channel shows where the trend and the ±1σ / ±2σ bands sit in coming years — the range that has historically contained most of the action. It is <span style={{color:C.ink}}>not a forecast</span> of where price will trade. Treat this as a weekly check-in, not an intraday tool.
          </p>
        </div>
      </Card>

      <div style={{fontFamily:SANS,fontStyle:"italic",fontSize:12.5,color:C.mut2,textAlign:"center",marginTop:24,lineHeight:1.6}}>
        {srcLabel} · Demonstration only — not investment advice. Past performance and modelled projections do not guarantee future results.
      </div>

      {/* GMI FOOTER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:40,paddingTop:16,borderTop:`1px solid ${C.line}`,
        fontFamily:MONO,fontSize:12,fontWeight:500,letterSpacing:"2px",textTransform:"uppercase",color:C.mut2}}>
        <span>GMI</span>
        <span>The Compounding Machine</span>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<CompoundingMachine/>);
</script>
</body>
</html>
