<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The GMI Compounding Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0a0d14; --bg-grad-1:#0c1018; --card:#10141d; --card-2:#0d1119; --raise:#161b26;
    --line:rgba(255,255,255,0.06); --line-2:rgba(255,255,255,0.10);
    --text:#e9ecf3; --muted:#8b93a6; --faint:#5b6477;
    --lime:#c3f53c; --lime-dim:rgba(195,245,60,0.14);
    --green:#34d399; --green-dim:rgba(52,211,153,0.12);
    --red:#f87171; --red-dim:rgba(248,113,113,0.12);
    --gold:#f5c451; --gold-dim:rgba(245,196,81,0.12);
    --cyan:#22d3ee; --purple:#b794f4; --blue:#60a5fa;
    --mono:'Hanken Grotesk',system-ui,sans-serif;
    --sans:'Hanken Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum" 1,"lnum" 1;}
  body{background:radial-gradient(1200px 600px at 70% -10%, #131a26 0%, var(--bg) 55%);}
  #root{min-height:100vh;}
  #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--muted);font-size:16px;font-family:var(--sans);letter-spacing:.02em;}

  /* range sliders — lime fill, white thumb (RV) */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:99px;
    background:linear-gradient(to right,var(--lime) 0%,var(--lime) var(--pct,50%),rgba(255,255,255,0.10) var(--pct,50%),rgba(255,255,255,0.10) 100%);
    cursor:pointer;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;
    background:#fff;border:none;box-shadow:0 1px 4px rgba(0,0,0,.5);cursor:pointer;transition:transform .12s ease;}
  input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.12);}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;border:none;box-shadow:0 1px 4px rgba(0,0,0,.5);cursor:pointer;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#222836;border-radius:99px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-thumb:hover{background:#2c3445;}

  .recharts-cartesian-axis-tick text{font-family:var(--mono);}

  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:24px;}
  @media (max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
  @media (max-width:560px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .ctrl-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;}
  @media (max-width:680px){.ctrl-grid{grid-template-columns:1fr;gap:8px;}}
</style>

<!-- Engine: data → compute → sources (our QQQ engine + live pipeline) -->
<script src="data/data.js"></script>
<script src="lib/compute.js"></script>
<script src="lib/sources.js"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"><div id="loading">Loading price history…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;
const { ComposedChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, ReferenceLine, ReferenceDot } = Recharts;

const C = {
  bg:"#0a0d14", card:"#10141d", card2:"#0d1119", raise:"#161b26",
  line:"rgba(255,255,255,0.06)", line2:"rgba(255,255,255,0.10)",
  text:"#e9ecf3", muted:"#8b93a6", faint:"#5b6477",
  lime:"#c3f53c", green:"#34c759", red:"#f04f5f", gold:"#f5c451",
  cyan:"#22d3ee", purple:"#b794f4", blue:"#60a5fa",
  buyDot:"#4ade80", sellDot:"#ff5d6c",
};
const MONO="'Hanken Grotesk',system-ui,sans-serif";

const REGISTRY = window.GMI_SOURCES.ASSET_REGISTRY;
const getAssetSeries = window.GMI_SOURCES.getAssetSeries;
const COMPUTE = window.GMI_COMPUTE;

const fmt$=v=>v>=1e9?"$"+(v/1e9).toFixed(1)+"B":v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1e3?"$"+(v/1e3).toFixed(0)+"K":"$"+v.toFixed(0);
const fmtP=v=>v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1e3?"$"+(v/1e3).toFixed(0)+"K":"$"+v.toFixed(0);
const fmtDate=ts=>new Date(ts).toLocaleDateString("en-US",{month:"short",year:"2-digit"});
const fmtDateFull=ts=>new Date(ts).toLocaleDateString("en-US",{day:"numeric",month:"short",year:"numeric"});

// log ticks at powers of 10, only those INSIDE the padded domain so the axis
// hugs the data instead of being stretched up an empty decade by an out-of-range tick.
function logTicks(min,max){
  if(!(min>0)||!(max>min)) return undefined;
  const loD=min*0.9, hiD=max*1.1, t=[];
  for(let e=Math.floor(Math.log10(min)); e<=Math.ceil(Math.log10(max)); e++){
    const v=Math.pow(10,e);
    if(v>=loD && v<=hiD) t.push(v);
  }
  return t.length?t:undefined;
}
function yearTicks(min,max){
  const a=new Date(min).getFullYear(), b=new Date(max).getFullYear(), t=[];
  const step=(b-a)>14?3:2;
  for(let y=Math.ceil(a/step)*step;y<=b;y+=step) t.push(new Date(y,0,1).getTime());
  return t;
}

// ---------- atoms ----------
function Eyebrow({children,color=C.muted,style}){
  return <div style={{fontSize:10.5,letterSpacing:".16em",textTransform:"uppercase",color,fontWeight:600,...style}}>{children}</div>;
}

function Segmented({options,value,onChange,size="md"}){
  const pad = size==="sm"?"6px 14px":"8px 18px";
  const fs = size==="sm"?12:13;
  return(
    <div style={{display:"inline-flex",background:C.card2,border:`1px solid ${C.line}`,borderRadius:10,padding:3,gap:2}}>
      {options.map(o=>{
        const on=o.value===value;
        return <button key={o.value} onClick={()=>onChange(o.value)} style={{
          padding:pad,fontSize:fs,fontWeight:600,fontFamily:"var(--sans)",letterSpacing:".02em",
          background:on?C.raise:"transparent",color:on?C.text:C.muted,
          border:on?`1px solid ${C.line2}`:"1px solid transparent",borderRadius:7,cursor:"pointer",
          transition:"all .18s cubic-bezier(0.22,1,0.36,1)",whiteSpace:"nowrap",
        }}>{o.label}</button>;
      })}
    </div>
  );
}

function Pill({children,tone="neutral"}){
  const map={
    buy:{bg:"rgba(52,199,89,0.12)",bd:"rgba(52,199,89,0.5)",fg:C.green},
    sell:{bg:"rgba(240,79,95,0.12)",bd:"rgba(240,79,95,0.5)",fg:C.red},
    live:{bg:"rgba(52,199,89,0.12)",bd:"rgba(52,199,89,0.4)",fg:C.green},
    neutral:{bg:"rgba(139,147,166,0.12)",bd:"rgba(139,147,166,0.3)",fg:C.muted},
  }[tone];
  return <span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,fontWeight:700,letterSpacing:".06em",
    textTransform:"uppercase",padding:"5px 11px",borderRadius:99,background:map.bg,border:`1px solid ${map.bd}`,color:map.fg}}>{children}</span>;
}

function Card({children,style,pad=24}){
  return <div style={{background:C.card,border:`1px solid ${C.line}`,borderRadius:16,padding:pad,...style}}>{children}</div>;
}

function Slider({label,value,onChange,min,max,step,pre="",suf="",editable=false,accent=C.lime}){
  const [draft,setDraft]=useState(null);
  const pct=((value-min)/(max-min))*100;
  const display=draft!==null?draft:(typeof value==='number'&&value>=1000?value.toLocaleString():String(value));
  const commit=()=>{
    if(draft===null)return;
    const raw=draft.replace(/[^0-9.]/g,"");
    if(raw===""){setDraft(null);return;}
    const n=Number(raw); if(isNaN(n)){setDraft(null);return;}
    onChange(Math.max(min,Math.min(max,n))); setDraft(null);
  };
  return(<div style={{marginBottom:20}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{fontSize:13,color:C.muted}}>{label}</span>
      {editable?(
        <div style={{display:"flex",alignItems:"center",background:C.card2,border:`1px solid ${C.line2}`,borderRadius:8,padding:"3px 10px"}}>
          {pre&&<span style={{fontSize:13,color:C.faint,fontFamily:MONO}}>{pre}</span>}
          <input type="text" inputMode="numeric" value={display}
            onChange={e=>setDraft(e.target.value)} onBlur={commit}
            onKeyDown={e=>{if(e.key==='Enter')e.target.blur();}}
            style={{background:"transparent",border:"none",outline:"none",color:C.text,fontFamily:MONO,fontWeight:600,fontSize:15,width:96,textAlign:"right",padding:"2px 0"}}/>
          {suf&&<span style={{fontSize:13,color:C.faint,fontFamily:MONO,marginLeft:3}}>{suf}</span>}
        </div>
      ):(
        <span style={{fontSize:15,color:C.text,fontFamily:MONO,fontWeight:600}}>{pre}{typeof value==='number'&&value>=1000?value.toLocaleString():value}{suf}</span>
      )}
    </div>
    <input type="range" min={min} max={max} step={step} value={value}
      onChange={e=>onChange(Number(e.target.value))}
      style={{"--pct":pct+"%",background:`linear-gradient(to right,${accent} 0%,${accent} ${pct}%,rgba(255,255,255,0.10) ${pct}%,rgba(255,255,255,0.10) 100%)`}}/>
  </div>);
}

function SummaryTile({label,children,sub}){
  return <div style={{flex:"1 1 0",minWidth:130,padding:"4px 22px"}}>
    <Eyebrow style={{marginBottom:10}}>{label}</Eyebrow>
    <div>{children}</div>
    {sub&&<div style={{fontSize:11.5,color:C.faint,marginTop:8}}>{sub}</div>}
  </div>;
}

function Stat({label,value,color=C.text,sub}){
  return <div style={{background:C.card,padding:"18px 18px 16px"}}>
    <Eyebrow style={{marginBottom:14}}>{label}</Eyebrow>
    <div style={{fontSize:23,fontWeight:700,color,fontFamily:MONO,letterSpacing:"-.01em",lineHeight:1}}>{value}</div>
    <div style={{height:1,background:C.line,margin:"14px 0 10px"}}></div>
    <div style={{fontSize:11.5,color:C.muted,lineHeight:1.35}}>{sub}</div>
  </div>;
}

function ChartLegend({items}){
  return <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:20,marginBottom:6}}>
    {items.map((it,i)=>(
      <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
        {it.dot
          ? <span style={{width:10,height:10,borderRadius:99,background:it.color,display:"inline-block",boxShadow:`0 0 0 2px ${C.card}`}}></span>
          : <span style={{width:22,height:0,borderTop:`${it.w||2}px ${it.dash?"dashed":"solid"} ${it.color}`,display:"inline-block"}}></span>}
        <span style={{fontSize:12,color:it.strong?C.text:C.muted,fontWeight:it.strong?600:500}}>{it.label}</span>
      </div>
    ))}
  </div>;
}

function CompoundingMachine(){
  const [assetKey,setAssetKey]=useState(REGISTRY[0].key);
  const [series,setSeries]=useState(null);
  const [srcLabel,setSrcLabel]=useState("");
  const [live,setLive]=useState(false);
  const [loading,setLoading]=useState(true);
  const [initialStake,setInitialStake]=useState(100000);
  const [buyThreshold,setBuyThreshold]=useState(1.0);
  const [buyAmount,setBuyAmount]=useState(25000);
  const [sellThreshold,setSellThreshold]=useState(1.0);
  const [sellPct,setSellPct]=useState(20);

  const meta=useMemo(()=>REGISTRY.filter(a=>a.key===assetKey)[0],[assetKey]);

  useEffect(()=>{
    let cancelled=false; setLoading(true);
    getAssetSeries(assetKey).then(res=>{
      if(cancelled)return;
      setSeries(res.series); setLive(!!res.live);
      setSrcLabel(res.live?("Live · "+res.source):("Demo · as of "+(res.asOf||"")));
      setLoading(false);
    }).catch(()=>{
      if(cancelled)return;
      const emb=((window.DASHBOARD_DATA||{}).assets||{})[assetKey];
      setSeries(emb?emb.series:[]); setLive(false);
      setSrcLabel("Demo · as of "+((window.DASHBOARD_DATA||{}).updated||""));
      setLoading(false);
    });
    return ()=>{cancelled=true;};
  },[assetKey]);

  const analysis=useMemo(()=>{
    if(!series||series.length<10)return null;
    return COMPUTE.analyse(series,{
      startDate:"2017-09-01",freezeDate:"2025-12-31",projectToYear:meta.projectToYear,
      initialStake,buyThreshold,buyAmount,sellThreshold,sellPct
    });
  },[series,meta,initialStake,buyThreshold,buyAmount,sellThreshold,sellPct]);

  if(loading||!analysis) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:16,letterSpacing:".02em"}}>
      Loading price history…</div>);

  const {reg,run,currentSigma,trendNow,lastPrice,lastDate}=analysis;
  const {impliedCAGR,sd1pct}=reg;
  const {buys,sells,stats}=run;
  const {totalDeployed,outOfPocket,btcVal,cash,curH,curPure,pureCap}=stats;

  const all=run.sim, pure=run.pure;
  const step=Math.max(1,Math.floor(all.length/500));
  const cd=all.filter((_,i)=>i%step===0||i===all.length-1).map(d=>({date:d.date,price:d.price,trend:d.trend,upper1:d.upper1,lower1:d.lower1,upper2:d.upper2,lower2:d.lower2}));
  const histSim=all.filter(r=>!r.isProjection), histPure=pure.filter(r=>!r.isProjection);
  const pd=histSim.filter((_,i)=>i%step===0||i===histSim.length-1).map((d,idx,arr)=>{
    const pi=Math.round(idx*(histPure.length-1)/(arr.length-1));
    return {date:d.date,strategy:d.strategy,hodl:d.hodl,pure:(histPure[Math.min(pi,histPure.length-1)]||{}).pure ?? d.hodl};
  });

  // domains
  const priceVals=cd.flatMap(d=>[d.price,d.trend,d.upper2,d.lower2]).filter(v=>v>0);
  const pMin=Math.min(...priceVals), pMax=Math.max(...priceVals);
  const valVals=pd.flatMap(d=>[d.strategy,d.pure,d.hodl]).filter(v=>v>0);
  const vMin=Math.min(...valVals), vMax=Math.max(...valVals);
  const xMin=cd[0].date, xMax=cd[cd.length-1].date;
  const xMinV=pd[0].date, xMaxV=pd[pd.length-1].date;

  const sigCol=currentSigma<-buyThreshold?C.green:currentSigma>sellThreshold?C.red:C.text;
  const inBuyZone=currentSigma<-buyThreshold;
  const inSellZone=currentSigma>sellThreshold;
  const distPct=Math.round((lastPrice/trendNow-1)*100);
  const distCol=distPct<0?C.red:C.green;

  const Tip=({active,payload})=>{if(!active||!payload?.length)return null;const d=payload[0]?.payload;if(!d)return null;
    return(<div style={{background:"rgba(13,17,25,0.96)",border:`1px solid ${C.line2}`,padding:"11px 14px",borderRadius:10,fontSize:12,color:C.text,fontFamily:MONO,backdropFilter:"blur(6px)"}}>
      <div style={{color:C.muted,marginBottom:6,letterSpacing:".02em"}}>{fmtDate(d.date)}</div>
      {d.price!=null&&<div style={{color:C.cyan}}>Price&nbsp; {fmtP(d.price)}</div>}
      {d.trend!=null&&<div style={{color:C.text}}>Trend&nbsp; {fmtP(d.trend)}</div>}
      {d.strategy!=null&&<div style={{color:C.green}}>With sells&nbsp; {fmt$(d.strategy)}</div>}
      {d.pure!=null&&<div style={{color:C.purple}}>No sells&nbsp; {fmt$(d.pure)}</div>}
      {d.hodl!=null&&<div style={{color:C.muted}}>HODL only&nbsp; {fmt$(d.hodl)}</div>}
    </div>);};

  const div=C.line;

  return(
  <div style={{minHeight:"100vh",padding:"0 0 64px"}}>
    {/* top hairline accent */}
    <div style={{height:3,background:`linear-gradient(90deg,${C.lime},${C.cyan} 60%,transparent)`,opacity:.9}}></div>

    <div style={{maxWidth:1180,margin:"0 auto",padding:"32px 28px 0"}}>

      {/* HEADER */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:20,marginBottom:24}}>
        <div style={{maxWidth:680}}>
          <Eyebrow color={C.lime} style={{marginBottom:12}}>{meta.name} · Log Trend Strategy</Eyebrow>
          <h1 style={{fontSize:32,fontWeight:800,margin:0,lineHeight:1.05,letterSpacing:"-.02em"}}>The GMI Compounding Machine</h1>
          <p style={{fontSize:14,color:C.muted,marginTop:14,lineHeight:1.55}}>
            Regression frozen end of 2025 — <span style={{color:C.text,fontFamily:MONO}}>{impliedCAGR}%</span> CAGR, 1σ = <span style={{color:C.text,fontFamily:MONO}}>{sd1pct}%</span>.
            Weekly signals, fixed-dollar adds at the lows. The channel extends to {meta.projectToYear} to show the band of possible prices — not a forecast.
          </p>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:12}}>
          <Pill tone={live?"live":"neutral"}>
            <span style={{width:7,height:7,borderRadius:99,background:live?C.green:C.faint,boxShadow:live?`0 0 8px ${C.green}`:"none"}}></span>
            {live?"Live":"Beta · demo data"}
          </Pill>
          <Segmented options={REGISTRY.map(m=>({value:m.key,label:m.ticker}))} value={assetKey} onChange={setAssetKey}/>
        </div>
      </div>

      {/* STATUS STRIP — RV summary tiles */}
      <Card pad={0} style={{marginBottom:24,
        borderColor:inBuyZone?"rgba(52,199,89,0.35)":inSellZone?"rgba(240,79,95,0.35)":C.line,
        background:inBuyZone?"linear-gradient(180deg,rgba(52,199,89,0.05),transparent 60%)":inSellZone?"linear-gradient(180deg,rgba(240,79,95,0.05),transparent 60%)":C.card}}>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"stretch",padding:"22px 8px"}}>
          <SummaryTile label={`${meta.ticker} Price`} sub={fmtDateFull(lastDate)}>
            <span style={{fontSize:26,fontWeight:700,fontFamily:MONO,letterSpacing:"-.01em"}}>{fmtP(lastPrice)}</span>
          </SummaryTile>
          <div style={{width:1,background:div,alignSelf:"stretch",margin:"2px 0"}}></div>
          <SummaryTile label="Log Trend" sub="Fair value, frozen Dec '25">
            <span style={{fontSize:26,fontWeight:700,fontFamily:MONO,color:C.text,letterSpacing:"-.01em"}}>{fmtP(trendNow)}</span>
          </SummaryTile>
          <div style={{width:1,background:div,alignSelf:"stretch",margin:"2px 0"}}></div>
          <SummaryTile label="Distance to Trend" sub="Price vs fair value">
            <span style={{fontSize:26,fontWeight:700,fontFamily:MONO,color:distCol,letterSpacing:"-.01em"}}>{distPct>0?"+":""}{distPct}%</span>
          </SummaryTile>
          <div style={{width:1,background:div,alignSelf:"stretch",margin:"2px 0"}}></div>
          <SummaryTile label="Signal">
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontSize:28,fontWeight:800,fontFamily:MONO,color:sigCol,letterSpacing:"-.02em"}}>{currentSigma>0?"+":""}{currentSigma.toFixed(1)}σ</span>
              {inBuyZone&&<Pill tone="buy">Buy zone</Pill>}
              {inSellZone&&<Pill tone="sell">Sell zone</Pill>}
              {!inBuyZone&&!inSellZone&&<Pill tone="neutral">Neutral</Pill>}
            </div>
          </SummaryTile>
        </div>
      </Card>

      {/* CONTROLS */}
      <Card style={{marginBottom:24}}>
        <Slider label="Initial Investment" value={initialStake} onChange={setInitialStake} min={10000} max={1000000} step={25000} pre="$" editable/>
        <div style={{height:1,background:C.line,margin:"6px 0 22px"}}></div>
        <div className="ctrl-grid">
          <div>
            <Eyebrow color={C.green} style={{marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.line}`}}>Buy Zone</Eyebrow>
            <Slider label="Buy when oversold by" value={buyThreshold} onChange={setBuyThreshold} min={0.5} max={2.0} step={0.1} suf="σ" accent={C.green}/>
            <Slider label="Fixed amount to add each time" value={buyAmount} onChange={setBuyAmount} min={5000} max={1000000} step={25000} pre="$" editable accent={C.green}/>
          </div>
          <div>
            <Eyebrow color={C.red} style={{marginBottom:16,paddingBottom:12,borderBottom:`1px solid ${C.line}`}}>Lifestyle Chips · set to 0% to disable</Eyebrow>
            <Slider label="Sell when overbought by" value={sellThreshold} onChange={setSellThreshold} min={0.5} max={2.0} step={0.1} suf="σ" accent={C.red}/>
            <Slider label="Amount to sell" value={sellPct} onChange={setSellPct} min={0} max={50} step={5} suf={"% of "+meta.unit} accent={C.red}/>
          </div>
        </div>
      </Card>

      {/* KPI GRID */}
      <div className="kpi-grid">
        <Stat label="Total Invested" value={fmt$(totalDeployed)} color={C.lime} sub={`${fmt$(initialStake)} initial + ${buys.length} × ${fmt$(buyAmount)}`}/>
        <Stat label="Out of Pocket" value={fmt$(outOfPocket)} color={C.text} sub="New money from you"/>
        <Stat label={`${meta.ticker} in Market`} value={fmt$(btcVal)} color={C.green} sub={`${(btcVal/totalDeployed).toFixed(1)}× total deployed`}/>
        <Stat label="Cash from Sells" value={fmt$(cash)} color={C.gold} sub={sells.length>0?"Lifestyle or reload":"No sells yet"}/>
        <Stat label="vs Just Holding" value={fmt$(curH)} color={C.muted} sub={`${(curH/initialStake).toFixed(1)}× initial only`}/>
        <Stat label="No-Sells Strategy" value={fmt$(curPure)} color={C.purple} sub={`${fmt$(pureCap)} invested · ${(curPure/pureCap).toFixed(1)}×`}/>
      </div>

      {/* CHART 1 — price vs trend */}
      <Card style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",flexWrap:"wrap",gap:8,marginBottom:18}}>
          <div style={{fontSize:16,fontWeight:700,letterSpacing:"-.01em"}}>{meta.ticker} Price vs Log Trend</div>
          <div style={{fontSize:12,color:C.faint}}>Frozen Dec '25 · buy at −{buyThreshold}σ · sell at +{sellThreshold}σ · forward channel = possible ranges, not a forecast</div>
        </div>
        <ChartLegend items={[
          {color:C.cyan,label:`${meta.ticker} price`,strong:true},
          {color:C.text,label:"Log trend",dash:true},
          {color:C.purple,label:"±1σ band",dash:true,w:1.5},
          {color:C.faint,label:"±2σ band",dash:true,w:1.5},
          {color:C.buyDot,label:`Buys (${buys.length})`,dot:true,strong:true},
          ...(sells.length?[{color:C.sellDot,label:`Sells (${sells.length})`,dot:true,strong:true}]:[]),
        ]}/>
        <ResponsiveContainer width="100%" height={400}>
          <ComposedChart data={cd} margin={{top:8,right:16,left:8,bottom:4}}>
            <CartesianGrid stroke={C.line} strokeDasharray="2 4" vertical={false}/>
            <XAxis dataKey="date" type="number" scale="time" domain={[xMin,xMax]} ticks={yearTicks(xMin,xMax)}
              tickFormatter={fmtDate} stroke={C.faint} tick={{fill:C.muted,fontSize:11}} tickLine={false} axisLine={{stroke:C.line2}}/>
            <YAxis scale="log" domain={[pMin*0.9,pMax*1.1]} ticks={logTicks(pMin,pMax)} tickFormatter={fmtP}
              stroke={C.faint} tick={{fill:C.muted,fontSize:11}} tickLine={false} axisLine={false} width={56}/>
            <Tooltip content={<Tip/>}/>
            <ReferenceLine x={lastDate} stroke={C.line2} strokeDasharray="3 4" label={{value:"now",fill:C.faint,fontSize:10,position:"insideTopRight"}}/>
            <Line dataKey="upper2" stroke={C.faint} strokeWidth={1} strokeDasharray="1 5" dot={false} connectNulls isAnimationActive={false}/>
            <Line dataKey="lower2" stroke={C.faint} strokeWidth={1} strokeDasharray="1 5" dot={false} connectNulls isAnimationActive={false}/>
            <Line dataKey="upper1" stroke={C.purple} strokeWidth={1.25} strokeDasharray="4 5" dot={false} connectNulls isAnimationActive={false} opacity={0.7}/>
            <Line dataKey="lower1" stroke={C.purple} strokeWidth={1.25} strokeDasharray="4 5" dot={false} connectNulls isAnimationActive={false} opacity={0.7}/>
            <Line dataKey="trend" stroke={C.text} strokeWidth={1.5} strokeDasharray="6 5" dot={false} connectNulls isAnimationActive={false} opacity={0.85}/>
            <Line dataKey="price" stroke={C.cyan} strokeWidth={2} dot={false} connectNulls isAnimationActive={false}/>
            {buys.map((b,i)=>(<ReferenceDot key={"buy"+i} x={b.date} y={b.price} r={5} fill={C.buyDot} stroke={C.bg} strokeWidth={1.75} isFront ifOverflow="extendDomain"/>))}
            {sells.map((s,i)=>(<ReferenceDot key={"sell"+i} x={s.date} y={s.price} r={5} fill={C.sellDot} stroke={C.bg} strokeWidth={1.75} isFront ifOverflow="extendDomain"/>))}
          </ComposedChart>
        </ResponsiveContainer>
      </Card>

      {/* CHART 2 — strategy value */}
      <Card style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",flexWrap:"wrap",gap:8,marginBottom:18}}>
          <div style={{fontSize:16,fontWeight:700,letterSpacing:"-.01em"}}>Portfolio Value · Strategy vs Holding</div>
          <div style={{fontSize:12,color:C.faint}}>Log scale · same {fmt$(initialStake)} starting stake</div>
        </div>
        <ChartLegend items={[
          {color:C.green,label:"With sells (lifestyle)",strong:true},
          {color:C.purple,label:"No sells (pure compound)",strong:true},
          {color:C.muted,label:"HODL only",w:1.5},
        ]}/>
        <ResponsiveContainer width="100%" height={340}>
          <ComposedChart data={pd} margin={{top:8,right:16,left:8,bottom:4}}>
            <CartesianGrid stroke={C.line} strokeDasharray="2 4" vertical={false}/>
            <XAxis dataKey="date" type="number" scale="time" domain={[xMinV,xMaxV]} ticks={yearTicks(xMinV,xMaxV)}
              tickFormatter={fmtDate} stroke={C.faint} tick={{fill:C.muted,fontSize:11}} tickLine={false} axisLine={{stroke:C.line2}}/>
            <YAxis scale="log" domain={[vMin*0.9,vMax*1.1]} ticks={logTicks(vMin,vMax)} tickFormatter={fmt$}
              stroke={C.faint} tick={{fill:C.muted,fontSize:11}} tickLine={false} axisLine={false} width={56}/>
            <Tooltip content={<Tip/>}/>
            <Line dataKey="hodl" stroke={C.muted} strokeWidth={1.5} dot={false} isAnimationActive={false} opacity={0.7}/>
            <Line dataKey="pure" stroke={C.purple} strokeWidth={2} dot={false} isAnimationActive={false}/>
            <Line dataKey="strategy" stroke={C.green} strokeWidth={2} dot={false} isAnimationActive={false}/>
          </ComposedChart>
        </ResponsiveContainer>
      </Card>

      {/* HOW TO USE */}
      <Card style={{marginBottom:8}}>
        <Eyebrow color={C.lime} style={{marginBottom:14}}>How to use it</Eyebrow>
        <div style={{fontSize:13.5,color:C.muted,lineHeight:1.7,maxWidth:900}}>
          <p style={{margin:"0 0 12px"}}>
            The big <span style={{color:C.text,fontFamily:MONO}}>σ</span> reading at the top is the whole signal — how far price sits from its long-run trend. Below <span style={{color:C.green}}>−{buyThreshold}σ</span> is the <span style={{color:C.green}}>buy zone</span> (stretched cheap); above <span style={{color:C.red}}>+{sellThreshold}σ</span> is the <span style={{color:C.red}}>sell zone</span>. Green dots on the chart mark historical adds, red dots mark trims.
          </p>
          <p style={{margin:"0 0 12px"}}>
            The trend is a <span style={{color:C.text}}>frozen log-linear regression</span> on weekly closes (Sept 2017 → Dec 2025: <span style={{color:C.text,fontFamily:MONO}}>{impliedCAGR}%</span> CAGR, 1σ = <span style={{color:C.text,fontFamily:MONO}}>{sd1pct}%</span>). Each buy signal adds a fixed <span style={{color:C.text,fontFamily:MONO}}>{fmt$(buyAmount)}</span> at the lows; the optional “lifestyle chips” trim <span style={{color:C.text,fontFamily:MONO}}>{sellPct}%</span> of holdings when overbought. Cash from trims funds the next buys first — which is why <span style={{color:C.text}}>Out of Pocket</span> can sit well below <span style={{color:C.text}}>Total Invested</span>. The <span style={{color:C.purple}}>No-Sells</span> line is pure compounding: adds at the lows, never trimming.
          </p>
          <p style={{margin:0}}>
            The forward channel shows where the trend and the ±1σ / ±2σ bands sit in coming years — the range that has historically contained most of the action. It is <span style={{color:C.text}}>not a forecast</span> of where price will trade. Treat this as a weekly check-in, not an intraday tool.
          </p>
        </div>
      </Card>

      <div style={{fontSize:11.5,color:C.faint,textAlign:"center",marginTop:24,lineHeight:1.6}}>
        {srcLabel} · Demonstration only — not investment advice. Past performance and modelled projections do not guarantee future results.
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<CompoundingMachine/>);
</script>
</body>
</html>
